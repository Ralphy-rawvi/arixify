<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
  <link rel="icon" type="image/png" sizes="144x144" href="../favicon-144x144.png">
  <link rel="icon" type="image/png" sizes="96x96" href="../favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="48x48" href="../favicon-48x48.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Arixify</title>
  <meta name="description" content="Prompt engineering tips, AI workflow guides, and practical techniques for ChatGPT, Claude, Gemini, and more." />
  <link rel="canonical" href="https://arixify.com/blog/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0A0A0F;
      --bg-secondary: #111118;
      --bg-card: #16151F;
      --bg-elevated: #1C1B28;
      --border-subtle: #1F1E2E;
      --border-default: #2A293D;
      --accent: #7C6EFA;
      --accent-soft: #9D8DFF;
      --accent-glow: rgba(124, 110, 250, 0.15);
      --text-primary: #EEEDF5;
      --text-secondary: #A09CB5;
      --text-tertiary: #6B6880;
      --cyan: #00D9FF;
      --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent-soft); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent); }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      border-bottom: 1.1px solid var(--border-subtle);
      border-top: 2px solid;
      border-image: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--cyan) 70%, transparent 100%) 1;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; color: var(--text-primary); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a { font-size: 13px; font-weight: 500; color: var(--text-tertiary); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent-soft); }
    .nav-links a.active { color: var(--accent-soft); }

    /* ── Container ── */
    .container { max-width: 780px; margin: 0 auto; padding: 120px 24px 100px; }

    /* ── Page header ── */
    .page-header { margin-bottom: 56px; text-align: center; }
    .page-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .page-title { font-size: 40px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 14px; line-height: 1.15; }
    .page-subtitle { font-size: 16px; color: var(--text-secondary); max-width: 520px; margin: 0 auto; line-height: 1.65; }

    /* ── Tag filter ── */
    .tag-filter {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
      margin-bottom: 48px; padding-bottom: 36px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .tag-pill {
      padding: 6px 16px; font-size: 12px; font-weight: 600;
      color: var(--text-tertiary); background: var(--bg-card);
      border: 1px solid var(--border-subtle); border-radius: 100px;
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .tag-pill:hover { color: var(--text-secondary); border-color: var(--border-default); }
    .tag-pill.active { color: var(--accent); background: var(--accent-glow); border-color: rgba(124, 110, 250, 0.3); }

    /* ── Post cards ── */
    .post-list { display: flex; flex-direction: column; gap: 20px; }

    .post-card {
      display: block; padding: 28px 32px;
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: 16px; text-decoration: none;
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .post-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .post-card:hover { border-color: var(--border-default); background: var(--bg-elevated); transform: translateY(-2px); text-decoration: none; }
    .post-card:hover::before { opacity: 0.5; }

    .post-card-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .post-card-read-time { font-size: 12px; font-family: var(--font-mono); color: var(--text-tertiary); letter-spacing: 0.02em; }
    .post-card-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-glow); padding: 3px 10px; border-radius: 100px;
    }
    .post-card-title {
      font-size: 20px; font-weight: 700; color: var(--text-primary);
      letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.35; transition: color 0.2s;
    }
    .post-card:hover .post-card-title { color: var(--accent-soft); }
    .post-card-desc {
      font-size: 14px; color: var(--text-secondary); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-card-arrow {
      position: absolute; right: 28px; top: 50%;
      transform: translateY(-50%) translateX(-4px);
      font-size: 18px; color: var(--text-tertiary); opacity: 0; transition: all 0.25s;
    }
    .post-card:hover .post-card-arrow { opacity: 1; transform: translateY(-50%) translateX(0); color: var(--accent); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 64px 24px; color: var(--text-tertiary); font-size: 14px; display: none; }

    /* ── Footer ── */
    .footer { margin-top: 80px; padding-top: 28px; border-top: 1px solid var(--border-subtle); text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 28px; margin-bottom: 14px; }
    .footer-links a { font-size: 12px; color: var(--text-tertiary); text-decoration: none; }
    .footer-links a:hover { color: var(--accent-soft); }
    .footer-copy { font-size: 12px; color: var(--text-tertiary); opacity: 0.6; }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .page-header { animation: fadeUp 0.5s ease both; }
    .tag-filter { animation: fadeUp 0.5s ease 0.1s both; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav { padding: 0 16px; } .nav-links { gap: 16px; }
      .container { padding: 100px 20px 80px; } .page-title { font-size: 30px; }
      .post-card { padding: 22px 20px; } .post-card-title { font-size: 17px; }
      .post-card-arrow { display: none; }
    }
    @media (max-width: 480px) {
      .nav { padding: 0 14px; } .nav-links a.hide-mobile { display: none; }
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="https://arixify.com">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#7C6EFA"/><path d="M11 8L7 16H14L10 24" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 8L15 16H22L18 24" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/></svg>
      Arixify
    </a>
    <div class="nav-links">
      <a href="https://arixify.com" class="hide-mobile">Home</a>
      <a href="/blog/" class="active">Blog</a>
      <a href="/privacy.html" class="hide-mobile">Privacy</a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <div class="page-label">Blog</div>
      <h1 class="page-title">Tips, Prompts & AI Workflows</h1>
      <p class="page-subtitle">Practical prompt engineering techniques and AI workflow strategies for developers, marketers, and creators.</p>
    </div>

    <div class="tag-filter" id="tagFilter">
      <!-- Tags generated dynamically from posts.json -->
    </div>

    <div class="post-list" id="postList">
      <!-- Cards generated dynamically from posts.json -->
    </div>

    <div class="empty-state" id="emptyState">No posts found for this category.</div>

    <div class="footer">
      <div class="footer-links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms</a>
        <a href="/billing.html">Billing</a>
        <a href="https://arixify.com">Home</a>
      </div>
      <p class="footer-copy">© <span id="current-year"></span> Arixify. All rights reserved.</p>
    </div>
  </div>

  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();

    (async function () {
      const postList = document.getElementById('postList');
      const tagFilter = document.getElementById('tagFilter');
      const emptyState = document.getElementById('emptyState');

      // ── Fetch posts.json ──
      let posts = [];
      try {
        const res = await fetch('/blog/posts.json');
        posts = await res.json();
      } catch (e) {
        postList.innerHTML = '<p style="color:var(--text-tertiary);text-align:center;padding:40px;">Unable to load posts.</p>';
        return;
      }

      if (!posts.length) {
        emptyState.style.display = 'block';
        emptyState.textContent = 'No posts yet. Check back soon.';
        return;
      }

      // ── Build tag pills ──
      const tagSet = new Map();
      posts.forEach(function (p) {
        if (!tagSet.has(p.tagSlug)) tagSet.set(p.tagSlug, p.tag);
      });

      var allPill = document.createElement('span');
      allPill.className = 'tag-pill active';
      allPill.dataset.tag = 'all';
      allPill.textContent = 'All';
      tagFilter.appendChild(allPill);

      tagSet.forEach(function (label, slug) {
        var pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.dataset.tag = slug;
        pill.textContent = label;
        tagFilter.appendChild(pill);
      });

      // ── Render cards ──
      posts.forEach(function (p, i) {
        var card = document.createElement('a');
        card.className = 'post-card';
        card.href = '/blog/posts/' + p.slug + '.html';
        card.dataset.tags = p.tagSlug;
        card.style.animation = 'fadeUp 0.45s ease ' + (0.15 + i * 0.07) + 's both';

        card.innerHTML =
          '<div class="post-card-meta">' +
            '<span class="post-card-read-time">' + p.readTime + '</span>' +
            '<span class="post-card-tag">' + p.tag + '</span>' +
          '</div>' +
          '<h2 class="post-card-title">' + p.title + '</h2>' +
          '<p class="post-card-desc">' + p.description + '</p>' +
          '<span class="post-card-arrow">→</span>';

        postList.appendChild(card);
      });

      // ── Tag filter logic ──
      var pills = tagFilter.querySelectorAll('.tag-pill');
      var cards = postList.querySelectorAll('.post-card');

      pills.forEach(function (pill) {
        pill.addEventListener('click', function () {
          pills.forEach(function (p) { p.classList.remove('active'); });
          pill.classList.add('active');
          var tag = pill.dataset.tag;
          var visible = 0;
          cards.forEach(function (card) {
            var show = tag === 'all' || card.dataset.tags === tag;
            card.style.display = show ? '' : 'none';
            if (show) visible++;
          });
          emptyState.style.display = visible === 0 ? 'block' : 'none';
        });
      });
    })();
  </script>

</body>
</html>
